<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sis Nutrindo{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            
            <h1 class="text-xl font-bold text-green-600">
                Sis Nutrindo
            </h1>

            <nav class="flex items-center gap-4">
                <a href="/" class="text-gray-700 hover:text-green-600 transition">
                    Home
                </a>

                <a href="/admin/" class="text-gray-700 hover:text-green-600 transition">
                    Admin
                </a>

                {% if request.user.is_authenticated %}
                    <span class="text-sm text-gray-600">
                        Olá, {{ request.user.email }}
                    </span>

                    <a href="#" class="text-red-500 hover:underline text-sm">
                        Sair
                    </a>
                {% else %}
                    <a href="#" class="text-green-600 hover:underline text-sm">
                        Login
                    </a>
                {% endif %}
            </nav>

        </div>
    </header>

    <!-- 📦 Conteúdo -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
